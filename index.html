    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --silver: #E0E0E0;
            --grey: #808080;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--accent);
            overflow-x: hidden;
            cursor: crosshair;
        }

        .autour-font {
            font-family: 'Abril Fatface', serif;
            letter-spacing: -0.02em;
        }

        .marathi-font {
            font-family: 'Noto Sans Marathi', sans-serif;
        }

        .serif-font {
            font-family: 'Instrument Serif', serif;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, var(--silver) 50%, var(--accent) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 5s linear infinite;
        }

        @keyframes shimmerText {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        /* Tactile Texture Layer (Static Paper) */
        .grain::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/dark-matter.png");
            opacity: 0.08;
            pointer-events: none;
            z-index: 99;
            mix-blend-mode: overlay;
        }

        /* Film Grain Effect (Animated Noise) */
        .grain::after {
            content: "";
            position: fixed;
            top: -150%;
            left: -150%;
            width: 300%;
            height: 300%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {

            0%,
            100% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-5%, -10%);
            }

            30% {
                transform: translate(-10%, 5%);
            }

            50% {
                transform: translate(10%, 10%);
            }

            70% {
                transform: translate(5%, -5%);
            }

            90% {
                transform: translate(-10%, 10%);
            }
        }

        /* Heat Pulse Animation */
        .heat-pulse {
            animation: heat 4s ease-in-out infinite;
        }

        @keyframes heat {

            0%,
            100% {
                opacity: 0.035;
                filter: blur(0px);
                transform: scale(1);
            }

            50% {
                opacity: 0.06;
                filter: blur(4px);
                transform: scale(1.02);
                color: var(--accent);
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        .reveal-up {
            animation: revealUp 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes revealUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-pulse {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(2.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #030303;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-text {
            font-family: 'Gotu', sans-serif;
            font-weight: 800;
            font-size: 12vw;
            background: linear-gradient(90deg, #ffffff, #808080, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 2rem;
            overflow: hidden;
            border-radius: 2px;
        }

        .loading-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ccff00, #ff2d55, #00f0ff);
            width: 0%;
            animation: loading 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        @keyframes loading {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
